apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: license-mgmt-network-policy
  namespace: license-mgmt
spec:
  podSelector:
    matchLabels:
      app: license-mgmt-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    # Allow from ingress controller
    - from:
        - namespaceSelector:
            matchLabels:
              name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
  # Allow egress to DNS, database, and redis
  egress:
    - to:
        - namespaceSelector: {}
      ports:
        - protocol: UDP
          port: 53  # DNS
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - protocol: TCP
          port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - protocol: TCP
          port: 6379
