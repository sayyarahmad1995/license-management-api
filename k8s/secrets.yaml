apiVersion: v1
kind: Secret
metadata:
  name: license-mgmt-secrets
  namespace: license-mgmt
type: Opaque
stringData:
  # Database credentials - CHANGE THESE IN PRODUCTION
  DB_USERNAME: license_mgmt
  DB_PASSWORD: "license-mgmt-secure-password-change-me"
  DB_DATABASE: license_mgmt
  DB_HOST: postgres
  
  # Redis credentials
  REDIS_PASSWORD: "redis-secure-password-change-me"
  
  # JWT signing key
  JWT_SECRET_KEY: "your-secret-key-change-in-production-min-32-chars"
  
  # SMTP configuration for email
  SMTP_HOST: "smtp.gmail.com"
  SMTP_PORT: "587"
  SMTP_USERNAME: "your-email@gmail.com"
  SMTP_PASSWORD: "your-app-password"
  SMTP_FROM: "noreply@example.com"
  
  # API keys for external services
  EXTERNAL_API_KEY: "your-external-api-key"
