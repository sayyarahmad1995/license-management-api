services:
  postgres:
    image: postgres:17
    container_name: ${POSTGRES_CONTAINER_NAME}
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    ports:
      - "${POSTGRES_HOST_PORT}:5432"
    volumes:
      - license-mgmt-postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  redis:
    image: redis:7-alpine
    container_name: ${REDIS_CONTAINER_NAME}
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD}
    ports:
      - "${REDIS_HOST_PORT}:6379"
    volumes:
      - license-mgmt-redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${API_CONTAINER_NAME}
    restart: unless-stopped
    ports:
      - "${PORT}:${PORT}"
    environment:
      PORT: ${PORT}
      ENVIRONMENT: ${ENVIRONMENT}
      DATABASE_URL: postgres://${DB_USERNAME}:${DB_PASSWORD}@${POSTGRES_CONTAINER_NAME}:${DB_PORT}/${DB_DATABASE}?sslmode=disable
      DB_HOST: ${POSTGRES_CONTAINER_NAME}
      DB_PORT: ${DB_PORT}
      DB_DATABASE: ${DB_DATABASE}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRY: ${JWT_ACCESS_EXPIRY}
      JWT_REFRESH_EXPIRY: ${JWT_REFRESH_EXPIRY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      REDIS_HOST: ${REDIS_CONTAINER_NAME}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      REDIS_DB: ${REDIS_DB}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME}
      SMTP_ENABLE_SSL: ${SMTP_ENABLE_SSL}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      CACHE_TTL_EMAIL_VERIFICATION: ${CACHE_TTL_EMAIL_VERIFICATION}
      CACHE_TTL_PASSWORD_RESET: ${CACHE_TTL_PASSWORD_RESET}
      CACHE_TTL_USER_SESSION: ${CACHE_TTL_USER_SESSION}
      CACHE_TTL_LAST_SEEN_ACTIVITY: ${CACHE_TTL_LAST_SEEN_ACTIVITY}
      CACHE_TTL_LICENSE_ACTIVATION: ${CACHE_TTL_LICENSE_ACTIVATION}
      CACHE_TTL_DASHBOARD_STATS: ${CACHE_TTL_DASHBOARD_STATS}
      CACHE_TTL_USER_LICENSES: ${CACHE_TTL_USER_LICENSES}
      RATE_LIMIT_LOGIN_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_MAX_ATTEMPTS}
      RATE_LIMIT_LOGIN_LOCKOUT_DURATION: ${RATE_LIMIT_LOGIN_LOCKOUT_DURATION}
      RATE_LIMIT_LOGIN_RESET_WINDOW: ${RATE_LIMIT_LOGIN_RESET_WINDOW}
      RATE_LIMIT_LOGIN_AUTH_USER_MAX_ATTEMPTS: ${RATE_LIMIT_LOGIN_AUTH_USER_MAX_ATTEMPTS}
      RATE_LIMIT_REGISTER_MAX_ATTEMPTS: ${RATE_LIMIT_REGISTER_MAX_ATTEMPTS}
      RATE_LIMIT_REGISTER_LOCKOUT_DURATION: ${RATE_LIMIT_REGISTER_LOCKOUT_DURATION}
      RATE_LIMIT_REGISTER_RESET_WINDOW: ${RATE_LIMIT_REGISTER_RESET_WINDOW}
      RATE_LIMIT_PASSWORD_RESET_MAX_ATTEMPTS: ${RATE_LIMIT_PASSWORD_RESET_MAX_ATTEMPTS}
      RATE_LIMIT_PASSWORD_RESET_LOCKOUT_DURATION: ${RATE_LIMIT_PASSWORD_RESET_LOCKOUT_DURATION}
      RATE_LIMIT_PASSWORD_RESET_RESET_WINDOW: ${RATE_LIMIT_PASSWORD_RESET_RESET_WINDOW}
      RATE_LIMIT_EMAIL_VERIFY_MAX_ATTEMPTS: ${RATE_LIMIT_EMAIL_VERIFY_MAX_ATTEMPTS}
      RATE_LIMIT_EMAIL_VERIFY_LOCKOUT_DURATION: ${RATE_LIMIT_EMAIL_VERIFY_LOCKOUT_DURATION}
      RATE_LIMIT_EMAIL_VERIFY_RESET_WINDOW: ${RATE_LIMIT_EMAIL_VERIFY_RESET_WINDOW}
      RATE_LIMIT_LICENSE_ACTIVATION_MAX_ATTEMPTS: ${RATE_LIMIT_LICENSE_ACTIVATION_MAX_ATTEMPTS}
      RATE_LIMIT_LICENSE_ACTIVATION_LOCKOUT_DURATION: ${RATE_LIMIT_LICENSE_ACTIVATION_LOCKOUT_DURATION}
      RATE_LIMIT_LICENSE_ACTIVATION_RESET_WINDOW: ${RATE_LIMIT_LICENSE_ACTIVATION_RESET_WINDOW}
      RATE_LIMIT_API_MAX_ATTEMPTS: ${RATE_LIMIT_API_MAX_ATTEMPTS}
      RATE_LIMIT_API_LOCKOUT_DURATION: ${RATE_LIMIT_API_LOCKOUT_DURATION}
      RATE_LIMIT_API_RESET_WINDOW: ${RATE_LIMIT_API_RESET_WINDOW}
      RATE_LIMIT_ENABLE_BACKOFF: ${RATE_LIMIT_ENABLE_BACKOFF}
      RATE_LIMIT_BACKOFF_MULTIPLIER: ${RATE_LIMIT_BACKOFF_MULTIPLIER}
      RATE_LIMIT_MAX_BACKOFF_MULTIPLIER: ${RATE_LIMIT_MAX_BACKOFF_MULTIPLIER}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:${PORT}/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  license-mgmt-postgres_data:
  license-mgmt-redis_data:

networks:
  app-network:
    driver: bridge
