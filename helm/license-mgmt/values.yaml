# License Management API Helm Chart Values
# This is a YAML-formatted file.
# Declare variables to be passed into templates.

replicaCount: 3

image:
  repository: license-management-api
  tag: latest
  pullPolicy: Always

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8080"
  prometheus.io/path: "/metrics"

podSecurityContext:
  fsGroup: 1000

securityContext:
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080
  annotations: {}

loadBalancer:
  enabled: false
  type: LoadBalancer
  port: 80

ingress:
  enabled: false
  className: "nginx"
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: license-mgmt-tls
      hosts:
        - api.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - license-mgmt-api
          topologyKey: kubernetes.io/hostname

# Application configuration
config:
  environment: "production"
  port: "8080"
  logLevel: "info"
  
  # Database configuration
  database:
    host: postgres
    port: "5432"
    name: license_mgmt
    # username and password should be in secrets
    sslMode: disable

  # Redis configuration
  redis:
    host: redis
    port: "6379"
    # password should be in secrets

  # JWT configuration
  jwt:
    expiryMinutes: "60"
    refreshTokenExpiryDays: "7"

  # Rate limiting
  rateLimiting:
    requests: "100"
    window: "1m"

  # Cache configuration
  cache:
    ttl: "3600"

  # Email configuration
  email:
    batchSize: "10"

  # Bulk operations
  bulkOperations:
    batchSize: "100"

# Secrets (should be overridden with actual values)
secrets:
  # Database credentials
  dbUsername: license_mgmt
  dbPassword: "change-me"
  dbDatabase: license_mgmt

  # Redis credentials
  redisPassword: "change-me"

  # JWT secret key
  jwtSecretKey: "change-me-min-32-chars"

  # SMTP configuration
  smtpHost: "smtp.gmail.com"
  smtpPort: "587"
  smtpUsername: "your-email@gmail.com"
  smtpPassword: "change-me"
  smtpFrom: "noreply@example.com"

  # External API keys
  externalApiKey: "change-me"

# Network policy
networkPolicy:
  enabled: true

# Pod disruption budget
podDisruptionBudget:
  enabled: true
  minAvailable: 2

# Health checks
healthChecks:
  livenessProbe:
    enabled: true
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  
  readinessProbe:
    enabled: true
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 2
  
  startupProbe:
    enabled: true
    initialDelaySeconds: 0
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 30
