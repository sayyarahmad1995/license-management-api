{{- /*
Template for Service
*/ -}}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "license-mgmt.fullname" . }}
  labels:
    {{- include "license-mgmt.labels" . | nindent 4 }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "license-mgmt.selectorLabels" . | nindent 4 }}

{{- if .Values.loadBalancer.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "license-mgmt.fullname" . }}-lb
  labels:
    {{- include "license-mgmt.labels" . | nindent 4 }}
spec:
  type: {{ .Values.loadBalancer.type }}
  ports:
    - port: {{ .Values.loadBalancer.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "license-mgmt.selectorLabels" . | nindent 4 }}
{{- end }}
