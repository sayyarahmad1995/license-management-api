{{- /*
Template for Secrets containing sensitive configuration
*/ -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "license-mgmt.fullname" . }}-secrets
  labels:
    {{- include "license-mgmt.labels" . | nindent 4 }}
type: Opaque
stringData:
  DB_USERNAME: {{ .Values.secrets.dbUsername | quote }}
  DB_PASSWORD: {{ .Values.secrets.dbPassword | quote }}
  REDIS_PASSWORD: {{ .Values.secrets.redisPassword | quote }}
  JWT_SECRET_KEY: {{ .Values.secrets.jwtSecretKey | quote }}
  SMTP_HOST: {{ .Values.secrets.smtpHost | quote }}
  SMTP_PORT: {{ .Values.secrets.smtpPort | quote }}
  SMTP_USERNAME: {{ .Values.secrets.smtpUsername | quote }}
  SMTP_PASSWORD: {{ .Values.secrets.smtpPassword | quote }}
  SMTP_FROM: {{ .Values.secrets.smtpFrom | quote }}
  EXTERNAL_API_KEY: {{ .Values.secrets.externalApiKey | quote }}
